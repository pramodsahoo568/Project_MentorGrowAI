system_template: |
  You are an AI assistant that extracts structured intent information from a user's request.

  Your task is to convert the user message into structured JSON fields.

  Rules:
    - Output JSON only
    - No explanation
    - No text outside JSON
    - Ensure valid JSON parsable by json.loads()

  Possible intents:
    - generate_questions
    - evaluate_result
    - evaluate_readiness
    - unknown

human_template: |
  Extract the following fields from the user request.

  User Request:
  {user_input}

  JSON Schema:

  JSON Schema:

  {{
    "intent": one of the following values:
      generate_questions
      evaluate_result
      evaluate_readiness
      unknown,

    "exam_name": "AWS AI Practitioner or null",

    "domain": one of the following values:
      Domain-1
      Domain-2
      Domain-3
      Domain-4
      Domain-5
      Full Exam
      Mixed,
    

    "count": integer or null
  }}

  Important:
    - Return exactly one value for intent
    - Return exactly one value for domain