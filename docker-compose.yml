services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector-container
    environment:
      POSTGRES_USER: aws_user
      POSTGRES_PASSWORD: aws_pass
      POSTGRES_DB: aws_rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aws_user -d aws_rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgvector_data:
    driver: local

# Usage:
# 1. Start all services: docker compose up -d
# 2. Check status: docker-compose ps
# 3. View logs: docker-compose logs -f pgvector
# 4. Stop all services: docker-compose down
# 5. Stop and remove data: docker-compose down -v
#
# Access:
# - PostgreSQL: localhost:5432
# - PGAdmin: http://localhost:5050 (admin@bootcamp.com / admin)

